# ─── BICTA Local Development Stack ───────────────────────────────────
# Run: docker-compose up
# This boots: MySQL + Hono API + Next.js frontend, all wired together.
# ──────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── MySQL Database (local dev only) ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: bicta-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: bicta_dev_password
      MYSQL_DATABASE: bicta
      MYSQL_USER: bicta_user
      MYSQL_PASSWORD: bicta_user_password
    ports:
      - "3306:3306"
    volumes:
      - bicta-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pbicta_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Hono tRPC Backend ─────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bicta-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      # Uses local MySQL (switch to Railway URL for prod)
      DATABASE_URL: mysql://root:bicta_dev_password@mysql:3306/bicta
      APP_ID: ${APP_ID:-dev_app_id}
      APP_SECRET: ${APP_SECRET:-dev_app_secret}
      KIMI_AUTH_URL: ${KIMI_AUTH_URL:-https://account.kimi.ai}
      KIMI_OPEN_URL: ${KIMI_OPEN_URL:-https://kimi.ai}
      OWNER_UNION_ID: ${OWNER_UNION_ID:-}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/trpc/ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Next.js Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BICTA_API_URL: http://api:3001
        NEXT_PUBLIC_SANITY_PROJECT_ID: ${NEXT_PUBLIC_SANITY_PROJECT_ID:-ouj7m9p4}
        NEXT_PUBLIC_SANITY_DATASET: production
    container_name: bicta-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PORT: 3000
      NEXT_PUBLIC_BICTA_API_URL: http://api:3001
      BICTA_API_URL: http://api:3001
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${NEXT_PUBLIC_SANITY_PROJECT_ID:-ouj7m9p4}
      NEXT_PUBLIC_SANITY_DATASET: production
      SANITY_API_TOKEN: ${SANITY_API_TOKEN:-}
      SANITY_REVALIDATE_SECRET: ${SANITY_REVALIDATE_SECRET:-dev_secret}
    ports:
      - "3000:3000"

volumes:
  bicta-mysql-data:
    driver: local
